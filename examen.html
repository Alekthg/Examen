<head>

    <style>
        /* ===== ESTILOS GENERALES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #1a1a2e;
            font-size: 28px;
            border-bottom: 3px solid #e94560;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        h1 span {
            color: #e94560;
        }

        /* ===== BARRA DE PROGRESO ===== */
        .progress-bar-container {
            background: #e9ecef;
            border-radius: 10px;
            height: 12px;
            margin: 15px 0 25px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #0f3460);
            border-radius: 10px;
            width: 0%;
            transition: width 0.4s ease;
        }

        /* ===== FILTROS ===== */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .filters select, .filters button {
            padding: 10px 16px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 140px;
        }

        .filters select:hover, .filters button:hover {
            border-color: #0f3460;
        }

        .filters button {
            background: #0f3460;
            color: white;
            border: none;
            font-weight: 600;
            flex: 0.5;
            min-width: 100px;
        }

        .filters button:hover {
            background: #1a1a5e;
        }

        .filters .stats {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-left: auto;
            font-size: 14px;
            color: #495057;
        }

        .filters .stats strong {
            color: #0f3460;
        }

        /* ===== TARJETA DE PREGUNTA ===== */
        .question-card {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }

        .question-card:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .question-number {
            font-weight: 600;
            color: #0f3460;
            font-size: 15px;
        }

        .question-topic {
            background: #e94560;
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .question-difficulty {
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .difficulty-basic {
            background: #d4edda;
            color: #155724;
        }

        .difficulty-intermediate {
            background: #fff3cd;
            color: #856404;
        }

        .difficulty-advanced {
            background: #f8d7da;
            color: #721c24;
        }

        .question-text {
            font-size: 17px;
            line-height: 1.6;
            margin: 12px 0 18px 0;
            color: #1a1a2e;
        }

        /* ===== OPCIONES ===== */
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
        }

        .option:hover:not(.disabled) {
            background: #e9ecef;
            border-color: #0f3460;
        }

        .option input[type="radio"] {
            margin-right: 14px;
            width: 18px;
            height: 18px;
            accent-color: #e94560;
            cursor: pointer;
            flex-shrink: 0;
        }

        .option.disabled {
            cursor: default;
            opacity: 0.9;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .option.show-correct {
            background: #d4edda;
            border-color: #28a745;
        }

        /* ===== BOTONES DE NAVEGACIÓN ===== */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .navigation button {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-prev {
            background: #e9ecef;
            color: #495057;
        }

        .nav-prev:hover:not(:disabled) {
            background: #dee2e6;
        }

        .nav-next {
            background: #0f3460;
            color: white;
        }

        .nav-next:hover:not(:disabled) {
            background: #1a1a5e;
        }

        .nav-reset {
            background: #e94560;
            color: white;
        }

        .nav-reset:hover {
            background: #c73e54;
        }

        .nav-check {
            background: #28a745;
            color: white;
        }

        .nav-check:hover:not(:disabled) {
            background: #218838;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== RESULTADOS ===== */
        .results {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            text-align: center;
            display: none;
        }

        .results.show {
            display: block;
        }

        .results h3 {
            font-size: 24px;
            color: #0f3460;
        }

        .results .score {
            font-size: 48px;
            font-weight: 700;
            color: #e94560;
            margin: 10px 0;
        }

        .results .message {
            font-size: 18px;
            color: #495057;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .filters {
                flex-direction: column;
            }

            .filters select, .filters button {
                flex: 1;
                width: 100%;
            }

            .filters .stats {
                margin-left: 0;
                justify-content: center;
                flex-wrap: wrap;
            }

            .question-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .navigation {
                flex-direction: column;
            }

            .navigation button {
                width: 100%;
            }
        }
    </style>
</head>

    { id: 144, topic: 'proteccion-civil', difficulty: 'basic', question: 'Las señales de tránsito de color azul son:', options: ['Preventivas', 'Restrictivas', 'Informativas', 'Obligatorias'], correct: 2 },

// ============================================================
// LÓGICA DE LA APLICACIÓN
// ============================================================

let currentQuestions = [];
let currentIndex = 0;
let answered = {};
let correctAnswers = 0;
let incorrectAnswers = 0;

function getFilteredQuestions() {
    const topic = document.getElementById('topicFilter').value;
    const difficulty = document.getElementById('difficultyFilter').value;
    return questionBank.filter(q => {
        const matchTopic = topic === 'all' || q.topic === topic;
        const matchDifficulty = difficulty === 'all' || q.difficulty === difficulty;
        return matchTopic && matchDifficulty;
    });
}

function applyFilters() {
    currentQuestions = getFilteredQuestions();
    currentIndex = 0;
    answered = {};
    correctAnswers = 0;
    incorrectAnswers = 0;
    document.getElementById('resultsContainer').classList.remove('show');
    renderQuestion();
    updateStats();
}

function renderQuestion() {
    const container = document.getElementById('questionsContainer');
    const progress = document.getElementById('progressBar');
    const total = currentQuestions.length;

    if (total === 0) {
        container.innerHTML = '<p style="text-align:center; padding:40px; color:#6c757d;">No hay preguntas que coincidan con los filtros seleccionados.</p>';
        progress.style.width = '0%';
        document.getElementById('totalQuestions').textContent = '0';
        document.getElementById('prevBtn').disabled = true;
        document.getElementById('nextBtn').disabled = true;
        document.getElementById('checkBtn').disabled = true;
        return;
    }

    document.getElementById('totalQuestions').textContent = total;
    document.getElementById('prevBtn').disabled = currentIndex === 0;
    document.getElementById('nextBtn').disabled = currentIndex === total - 1;
    document.getElementById('checkBtn').disabled = false;

    progress.style.width = `${((currentIndex + 1) / total) * 100}%`;

    const q = currentQuestions[currentIndex];
    const isAnswered = answered[q.id] !== undefined;

    let optionsHtml = '';
    const labels = ['A', 'B', 'C', 'D'];
    q.options.forEach((opt, idx) => {
        let className = 'option';
        let checked = '';
        let disabled = '';
        let correctClass = '';

        if (isAnswered) {
            className += ' disabled';
            disabled = 'disabled';
            if (answered[q.id] === idx) {
                checked = 'checked';
                className += idx === q.correct ? ' correct' : ' incorrect';
            } else if (idx === q.correct) {
                className += ' show-correct';
            }
        } else {
            if (answered[q.id] === idx) {
                checked = 'checked';
            }
        }

        optionsHtml += `
            <label class="${className}">
                <input type="radio" name="question_${q.id}" value="${idx}" ${checked} ${disabled} onchange="selectOption(${q.id}, ${idx})">
                <span><strong>${labels[idx]}.</strong> ${opt}</span>
            </label>
        `;
    });

    const difficultyClass = q.difficulty === 'basic' ? 'difficulty-basic' :
                          q.difficulty === 'intermediate' ? 'difficulty-intermediate' : 'difficulty-advanced';

    const topicNames = {
        'instruccion': 'Instrucción y Disciplina',
        'vigilancia': 'Vigilancia y Patrullaje',
        'derecho-penal': 'Derecho Penal',
        'comunicacion': 'Comunicación Asertiva',
        'planes-operativos': 'Planes Operativos',
        'armamento': 'Armamento y Tiro',
        'conduccion': 'Conducción de Vehículos',
        'detencion': 'Detención de Personas',
        'pr-24': 'Bastón PR-24',
        'radiocomunicacion': 'Radiocomunicación',
        'primer-respondiente': 'Primer Respondiente',
        'derechos-humanos': 'Derechos Humanos',
        'primeros-auxilios': 'Primeros Auxilios',
        'proteccion-civil': 'Protección Civil'
    };

    container.innerHTML = `
        <div class="question-card">
            <div class="question-header">
                <span class="question-number">Pregunta ${currentIndex + 1} de ${total}</span>
                <span class="question-topic">${topicNames[q.topic] || q.topic}</span>
                <span class="question-difficulty ${difficultyClass}">${q.difficulty === 'basic' ? '🟢 Básico' : q.difficulty === 'intermediate' ? '🟡 Intermedio' : '🔴 Avanzado'}</span>
            </div>
            <div class="question-text">${q.question}</div>
            <div class="options">${optionsHtml}</div>
            ${isAnswered ? `<p style="margin-top:12px; font-weight:600; color:${answered[q.id] === q.correct ? '#28a745' : '#dc3545'}">
                ${answered[q.id] === q.correct ? '✅ ¡Correcto!' : '❌ Incorrecto. La respuesta correcta era: ' + q.options[q.correct]}
            </p>` : ''}
        </div>
    `;

    updateStats();
}

function selectOption(qId, idx) {
    if (answered[qId] !== undefined) return;
    answered[qId] = idx;
    renderQuestion();
}

function checkAnswer() {
    const q = currentQuestions[currentIndex];
    if (answered[q.id] === undefined) {
        alert('Por favor, selecciona una opción primero.');
        return;
    }
    const isCorrect = answered[q.id] === q.correct;
    if (isCorrect) correctAnswers++;
    else incorrectAnswers++;
    renderQuestion();
    updateStats();

    // Mostrar resultados si ya se respondieron todas
    const total = currentQuestions.length;
    const answeredCount = Object.keys(answered).filter(id => currentQuestions.some(q => q.id == id)).length;
    if (answeredCount === total) {
        showResults();
    }
}

function updateStats() {
    const total = currentQuestions.length;
    const answeredCount = Object.keys(answered).filter(id => currentQuestions.some(q => q.id == id)).length;
    document.getElementById('correctCount').textContent = correctAnswers;
    document.getElementById('incorrectCount').textContent = incorrectAnswers;
    document.getElementById('answeredCount').textContent = answeredCount;
}

function showResults() {
    const total = currentQuestions.length;
    const answeredCount = Object.keys(answered).filter(id => currentQuestions.some(q => q.id == id)).length;
    if (answeredCount < total) return;
    const score = Math.round((correctAnswers / total) * 100);
    document.getElementById('scoreDisplay').textContent = score + '%';
    let message = '';
    if (score >= 90) message = '🌟 ¡Excelente! Dominas el tema.';
    else if (score >= 70) message = '👍 Muy bien, pero repasa los temas que fallaste.';
    else if (score >= 50) message = '📖 Necesitas estudiar más. Revisa los manuales.';
    else message = '💪 No te rindas. Estudia con calma y vuelve a intentarlo.';
    document.getElementById('messageDisplay').textContent = message;
    document.getElementById('resultsContainer').classList.add('show');
}

function nextQuestion() {
    if (currentIndex < currentQuestions.length - 1) {
        currentIndex++;
        renderQuestion();
    }
}

function prevQuestion() {
    if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
    }
}

function resetExam() {
    applyFilters();
    document.getElementById('resultsContainer').classList.remove('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// INICIALIZAR
// ============================================================
applyFilters();
</script>
